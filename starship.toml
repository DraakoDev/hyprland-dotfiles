"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ΌΓ║](bg_dim)\
$os[ ](bg:bg_dim)\
$username[ ](bg:bg_dim)\
$directory[ ](bg:bg_dim)\
[ΌΓ╝](fg:bg_dim)\
$fill\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$package\
$c\
$cpp\
$python\
$cmake\
$nodejs\
$bun\
$lua\
$cmd_duration\
$time[ ]()
$character\
"""
palette = 'everforest_soft'

[character]
success_symbol = "[ ΎΛθ](bold green)"
error_symbol = "[ΎΑΞ](bold red)"

[os]
disabled = false
style = "fg:blue bg:bg_dim"

[username]
format = "[$user]($style)"
style_user = "bold italic fg:green bg:bg_dim"
show_always = true
disabled = false

[directory]
format = "[$read_only ]($read_only_style)[$path]($style)"
style = "fg:blue bg:bg_dim"
read_only_style = "fg:red bg:bg_dim"
read_only = " ≤░Ν╛"

[time]
disabled = false
format = "[$time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed white"

[fill]
symbol = " "

[c]
symbol = "Όαη "

[cpp]
symbol = "Όαζ "

[cmake]
symbol = "ΌηΦ "

[fossil_branch]
symbol = "ΎΡα "

[git_branch]
symbol = "ΎΡα "

[git_commit]
tag_symbol = ' ΎΡΤ '

[gradle]
symbol = "Όβι "

[java]
symbol = "ΌΚΨ "

[bun]
symbol = "Όζψ "

[lua]
symbol = "Όαι "

[nodejs]
symbol = "Όεα "

[os.symbols]
Arch = "ΎΝΔ "
Linux = "ΎΝγ "
Windows = "≤░Ξ▓ "

[package]
symbol = "≤░ΠΩ "

[php]
symbol = "ΌαΙ "

[pijul_channel]
symbol = "ΎΡα "

[pixi]
symbol = "≤░ΠΩ "

[python]
symbol = "ΌΙ╡ "

[rust]
symbol = "≤▒αΩ "

[status]
symbol = "ΎΣπ "

[xmake]
symbol = "ΌηΦ "

[palettes.everforest_soft]
foreground = '#d3c6aa'
red = '#e67e80'
yellow = '#dbbc7f'
green = '#a7c080'
blue = '#7fbbb3'
purple = '#d699b6'
aqua = '#83c092'
orange = '#e69875'
grey_0 = '#7a8478'
grey_1 = '#829289'
grey_2 = '#9da9a0'
bg_dim = '#293136'
bg_0 = '#333c43'
bg_1 = '#3a464c'
bg_2 = '#434f55'
bg_3 = '#4d5960'
bg_4 = '#555f66'
bg_5 = '#5d6b66'
bg_red = '#59464c'
bg_yellow = '#55544a'
bg_green = '#48584e'
bg_blue = '#3f5865'
bg_purple = '#4e4953'
bg_visual = '#5c3f4f'
