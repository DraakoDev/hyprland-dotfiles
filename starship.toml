"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](bg_dim)\
$os[ ](bg:bg_dim)\
$username[ ](bg:bg_dim)\
$directory\
[](fg:bg_dim)\
$fill\
$all
$character\
"""
right_format = """
$time
"""
palette = 'everforest_soft'

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"

[os]
disabled = false
style = "fg:blue bg:bg_dim"

[username]
format = "[$user]($style)"
style_user = "bold italic fg:green bg:bg_dim"
show_always = true
disabled = false

[directory]
format = "[$read_only ]($read_only_style)[$path]($style)"
style = "fg:blue bg:bg_dim"
read_only_style = "fg:red bg:bg_dim"
read_only = " 󰌾"

[time]
disabled = false
format = "[$time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed white"

[fill]
symbol = " "

